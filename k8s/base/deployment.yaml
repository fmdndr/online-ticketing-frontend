apiVersion: apps/v1
kind: Deployment
metadata:
  name: online-ticketing-web
  labels:
    app.kubernetes.io/name: online-ticketing-web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: online-ticketing
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: online-ticketing-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: online-ticketing-web
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: online-ticketing
    spec:
      imagePullSecrets:
        - name: dockerhub-pull-secret
      containers:
        - name: web
          # Image is overridden by Kustomize overlay
          image: docker.io/fmdx/online-ticketing-frontend:latest
          # Always pull — ensures the updated prod-latest image is fetched on
          # every rollout restart, even when the node has a cached copy.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      terminationGracePeriodSeconds: 30
