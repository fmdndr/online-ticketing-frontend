apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: online-ticketing-web
  labels:
    app.kubernetes.io/name: online-ticketing-web
    app.kubernetes.io/part-of: online-ticketing
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "5m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # cert-manager: automatically provision & renew TLS certificates via Let's Encrypt.
    # Requires cert-manager + a ClusterIssuer named "letsencrypt-prod" installed in the cluster.
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: socratic-event.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: online-ticketing-web
                port:
                  number: 3000
  tls:
    - hosts:
        - socratic-event.com
      secretName: online-ticketing-frontend-tls
