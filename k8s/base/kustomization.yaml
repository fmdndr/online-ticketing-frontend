apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# NOTE: Do NOT use commonLabels here — it injects into
# Deployment.spec.selector.matchLabels which are immutable.
# Labels are defined directly in each manifest instead.

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - backend-service.yaml
  - configmap.yaml
  - ingress.yaml
  - ingress-api.yaml
